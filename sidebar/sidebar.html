<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="sidebar.css">
</head>
<body>
  <div class="container">
    <div class="element-info" id="element-info" aria-label="Selected element">No element selected</div>
    <div class="actions">
      <button type="button" id="btn-computed" aria-label="Copy computed styles to clipboard" disabled>Copy Computed</button>
      <button type="button" id="btn-styles" aria-label="Copy matched CSS rules to clipboard" disabled>Copy Styles</button>
      <button type="button" id="btn-animations" aria-label="Copy animations and keyframes to clipboard" disabled>Copy Animations</button>
    </div>
    <div class="status" id="status" role="status" aria-live="polite"></div>
  </div>
  <script src="sidebar.js"></script>
</body>
</html>
