<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="sidebar.css">
</head>
<body>
  <div class="container">
    <div class="element-info" id="element-info" aria-label="Selected element">No element selected</div>
    <div class="tabs" role="tablist">
      <button type="button" class="tab active" role="tab" aria-selected="true" data-mode="computed" disabled>Computed</button>
      <button type="button" class="tab" role="tab" aria-selected="false" data-mode="styles" disabled>Styles</button>
      <button type="button" class="tab" role="tab" aria-selected="false" data-mode="animations" disabled>Animations</button>
    </div>
    <pre class="preview" id="preview" aria-label="CSS output preview"></pre>
    <div class="toolbar">
      <button type="button" id="btn-copy" disabled>Copy to Clipboard</button>
      <div class="status" id="status" role="status" aria-live="polite"></div>
    </div>
  </div>
  <script src="sidebar.js"></script>
</body>
</html>
